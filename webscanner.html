<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growlytics Web Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f4f9f4; padding: 20px; }
        h2 { color: #2e7d32; }
        #webcam-container { margin: 20px auto; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.2); display: inline-block; }
        #label-container div { margin: 10px; font-size: 20px; font-weight: bold; color: #333; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #388E3C; }
    </style>
</head>
<body>

    <h2>Growlytics AI Web Scanner</h2>
    <p>Point your camera at a crop leaf to diagnose its health.</p>
    <button type="button" onclick="init()" id="startBtn">Start Camera</button>
    
    <div id="webcam-container"></div>
    <div id="label-container"></div>

    <script type="text/javascript">
        // 🛑 PASTE YOUR TEACHABLE MACHINE LINK HERE 🛑
        const URL = "https://teachablemachine.withgoogle.com/models/rFQeWZmpa/";

        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            document.getElementById("startBtn").innerText = "Loading AI Brain...";
            document.getElementById("startBtn").disabled = true;

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            // 1. Load the model and metadata
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // 2. Setup the webcam
            const flip = false; // Set to false so the rear camera doesn't act like a mirror
            webcam = new tmImage.Webcam(300, 300, flip); 
            
            // Pro-Tip: { facingMode: "environment" } forces mobile phones to use the BACK camera!
            await webcam.setup({ facingMode: "environment" }); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            // 3. Append camera to the screen
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            document.getElementById("startBtn").style.display = "none"; // Hide button once running
            
            labelContainer = document.getElementById("label-container");
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.appendChild(document.createElement("div"));
            }
        }

        async function loop() {
            webcam.update(); // Update the webcam frame
            await predict(); // Run the AI
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            // Predict the current frame
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                // Format the output: "Tomato Healthy: 98%"
                const classPrediction = prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(0) + "%";
                labelContainer.childNodes[i].innerHTML = classPrediction;
            }
        }
    </script>
</body>
</html>
